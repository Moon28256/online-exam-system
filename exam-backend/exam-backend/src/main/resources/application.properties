spring.application.name=exam-backend

# MySQL 数据库连接（支持环境变量覆盖，方便部署）
# 本地开发用默认值即可；部署时通过环境变量 DB_URL/DB_USER/DB_PASSWORD 覆盖
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/exam_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:mzls6666mo}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 静态资源：默认托管 classpath:/static/（部署时前端 dist 拷入此处）
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# 单页应用：找不到资源时返回 index.html（支持前端路由刷新）
# 配合前端 hash 路由，根路径 / 直接返回 index.html
