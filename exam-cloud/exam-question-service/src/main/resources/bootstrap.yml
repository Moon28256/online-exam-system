spring:
  application:
    name: exam-question-service
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NS:public}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NS:public}
        file-extension: yml
        shared-configs:
          - data-id: exam-shared.yml
            refresh: true
        fail-fast: false
