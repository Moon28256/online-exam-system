server:
  port: 8080

spring:
  cloud:
    gateway:
      # 按路径前缀路由到各业务服务（lb:// 走 Nacos + Spring Cloud LoadBalancer）
      routes:
        - id: user-service
          uri: lb://exam-user-service
          predicates:
            - Path=/user/**
        - id: question-service
          uri: lb://exam-question-service
          predicates:
            - Path=/question/**
        - id: paper-service
          uri: lb://exam-paper-service
          predicates:
            - Path=/paper/**
        - id: exam-service
          uri: lb://exam-exam-service
          predicates:
            - Path=/exam/**
        - id: score-service
          uri: lb://exam-score-service
          predicates:
            - Path=/score/**
        - id: wrong-service
          uri: lb://exam-wrong-service
          predicates:
            - Path=/wrong/**
        - id: analysis-service
          uri: lb://exam-analysis-service
          predicates:
            - Path=/analysis/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ['*']
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: ['*']
            allowCredentials: true
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

# JWT（与 user-service 共用同一 secret）
exam:
  jwt:
    secret: ${JWT_SECRET:OnlineExamSystem2026SecretKeyForJWT!!}
    expiration: ${JWT_EXPIRATION:86400000}
