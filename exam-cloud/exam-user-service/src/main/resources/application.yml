server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/exam_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:mzls6666mo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 与 Token TTL（与 gateway 共用同一 secret）
exam:
  jwt:
    secret: ${JWT_SECRET:OnlineExamSystem2026SecretKeyForJWT!!}
    expiration: ${JWT_EXPIRATION:86400000}
  redis:
    token-ttl: ${TOKEN_TTL:86400}
